<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBG HOD Games 2026 — Live Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #05070b;
      --gold:   #f5c842;
      --red:    #e8423a;
      --green:  #3ecf6a;
      --text:   #e8eaf0;
      --muted:  #5a6070;
      --border: #151a25;
      --blue:   #4e9eff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* BACKGROUND GLOW */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(245,200,66,0.07), transparent 60%);
      pointer-events: none;
    }

    /* HEADER */
    .live-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .live-event-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .live-event-name .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      margin: 0 10px;
      vertical-align: middle;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.1} }
    .live-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 7rem);
      letter-spacing: 4px;
      background: linear-gradient(135deg, #f5c842 0%, #fff 50%, #f5c842 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 0.9;
    }
    .live-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 3px;
      margin-top: 10px;
    }

    /* LEADERBOARD */
    .lb-wrap {
      width: 100%;
      max-width: 900px;
      display: none;
    }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 20px 32px;
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      transition: all 0.5s ease;
      animation: slideIn 0.4s ease both;
    }
    .lb-row:first-child {
      background: rgba(245,200,66,0.06);
      border-color: rgba(245,200,66,0.25);
      box-shadow: 0 0 40px rgba(245,200,66,0.08);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .lb-pos {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      width: 60px;
      text-align: center;
      flex-shrink: 0;
    }
    .pos-1 { color: var(--gold); }
    .pos-2 { color: #c0c0c0; }
    .pos-3 { color: #cd7f32; }
    .pos-other { color: var(--muted); }
    .lb-name {
      flex: 1;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 1.5px;
    }
    .lb-level {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      letter-spacing: 1px;
    }
    .lb-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: var(--gold);
      min-width: 120px;
      text-align: right;
    }
    .lb-row:first-child .lb-score {
      font-size: 3.6rem;
    }
    .score-bar-wrap {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--gold), #e8a800);
      transition: width 1s ease;
    }
    .lb-row:nth-child(2) .score-bar { background: linear-gradient(90deg, #c0c0c0, #888); }
    .lb-row:nth-child(3) .score-bar { background: linear-gradient(90deg, #cd7f32, #8b5a1a); }
    .lb-row:nth-child(n+4) .score-bar { background: linear-gradient(90deg, #4e9eff, #2266cc); }

    /* QUESTION VIEW */
    .question-wrap {
      width: 100%;
      max-width: 1000px;
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .q-text {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 40px;
      line-height: 1.3;
    }
    .q-image {
      max-height: 300px;
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
    }
    .option-box {
      background: rgba(255,255,255,0.05);
      border: 2px solid var(--border);
      padding: 30px;
      border-radius: 16px;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.3s ease;
    }
    .opt-letter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: var(--muted);
      width: 50px;
      text-align: center;
    }
    
    .opt-A .opt-letter { color: var(--blue); }
    .opt-B .opt-letter { color: var(--red); }
    .opt-C .opt-letter { color: var(--gold); }
    .opt-D .opt-letter { color: var(--green); }

    .option-box.correct {
      background: rgba(62, 207, 106, 0.15);
      border-color: var(--green);
      box-shadow: 0 0 30px rgba(62, 207, 106, 0.3);
      transform: scale(1.02);
    }
    .option-box.incorrect {
      opacity: 0.3;
    }

    /* STATUS DISPLAY */
    .status-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      letter-spacing: 5px;
      color: var(--gold);
      text-align: center;
      animation: pulse 2s infinite;
      display: none;
    }
    @keyframes pulse { 0% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.8; transform: scale(1); } }

    /* WINNER BANNER */
    .winner-banner {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: var(--green);
      background: rgba(62, 207, 106, 0.15);
      border: 2px solid var(--green);
      padding: 10px 40px;
      border-radius: 99px;
      margin-bottom: 20px;
      animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      display: none;
      text-transform: uppercase;
    }
    @keyframes slideDown { 0% { opacity: 0; transform: translateY(-50px); } 100% { opacity: 1; transform: translateY(0); } }

    /* TIMER DISPLAY */
    .timer-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      color: var(--gold);
      position: absolute;
      top: 40px;
      right: 60px;
      background: rgba(0,0,0,0.5);
      padding: 10px 30px;
      border-radius: 20px;
      border: 2px solid var(--gold);
      box-shadow: 0 0 30px rgba(245,200,66,0.3);
      display: none;
    }
    .timer-warning {
      color: var(--red);
      border-color: var(--red);
      box-shadow: 0 0 30px rgba(232,66,58,0.5);
      animation: pulse 0.5s infinite;
    }

    /* FOOTER */
    .live-footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 2px;
    }
    .live-footer strong { color: var(--gold); }
  </style>
</head>
<body>

  <div class="live-header">
    <div class="live-event-name">
      CBG <span class="dot"></span> HOD Games 2026 <span class="dot"></span> Live
    </div>
    <div class="live-title" id="liveTitle">BRAIN BATTLE</div>
    <div class="live-subtitle" id="liveSubtitle">GRAND FINALS</div>
  </div>

  <div id="countdownTimer" class="timer-display">15</div>

  <div class="status-display" id="statusDisplay">GET READY!</div>

  <div class="question-wrap" id="questionWrap">
    <div id="winnerBanner" class="winner-banner"></div>
    <img id="qImage" class="q-image" src="" alt="Question Image" style="display:none;">
    <div class="q-text" id="qText">Question goes here?</div>
    <div class="options-grid">
      <div class="option-box opt-A" id="optA"><div class="opt-letter">A</div> <span id="textA">Option A</span></div>
      <div class="option-box opt-B" id="optB"><div class="opt-letter">B</div> <span id="textB">Option B</span></div>
      <div class="option-box opt-C" id="optC"><div class="opt-letter">C</div> <span id="textC">Option C</span></div>
      <div class="option-box opt-D" id="optD"><div class="opt-letter">D</div> <span id="textD">Option D</span></div>
    </div>
  </div>

  <div class="lb-wrap" id="lbWrap"></div>

  <div class="live-footer">
    <span>Powered by <strong>Tutorial Haven</strong></span>
  </div>

<script>
  const quizId = "{{ quiz.id }}";
  // Fallback to URL param if not rendered with context
  const targetQuizId = quizId || (new URLSearchParams(window.location.search)).get('quiz');
  
  if (!targetQuizId) {
      document.getElementById('statusDisplay').innerText = "NO QUIZ ID";
      document.getElementById('statusDisplay').style.display = "block";
  }

  let currentState = '';
  let currentQuestionId = null;
  let timerInterval = null;
  let questionStartTime = null;

  function hideAll() {
    document.getElementById('statusDisplay').style.display = 'none';
    document.getElementById('questionWrap').style.display = 'none';
    document.getElementById('lbWrap').style.display = 'none';
  }

  function startCountdown() {
      if (!questionStartTime) return;
      clearInterval(timerInterval);
      
      const timerEl = document.getElementById('countdownTimer');
      timerEl.style.display = 'block';
      timerEl.className = 'timer-display';
      
      timerInterval = setInterval(() => {
          const now = new Date();
          const elapsed = (now - questionStartTime) / 1000;
          let left = Math.ceil(15 - elapsed);
          
          if (left <= 0) {
              left = 0;
              clearInterval(timerInterval);
              timerEl.innerText = "0";
              timerEl.className = 'timer-display timer-warning';
          } else {
              timerEl.innerText = left;
              if (left <= 5) {
                  timerEl.className = 'timer-display timer-warning';
              }
          }
      }, 100);
  }

  async function pollState() {
    if (!targetQuizId) return;
    try {
      // Add cache buster
      const res = await fetch(`/api/live-state/${targetQuizId}/?_t=${Date.now()}`);
      const data = await res.json();
      
      document.getElementById('liveTitle').innerText = data.title.toUpperCase();

      if (data.status === 'waiting') {
        hideAll();
        document.getElementById('countdownTimer').style.display = 'none';
        clearInterval(timerInterval);
        document.getElementById('statusDisplay').innerText = "GET READY!";
        document.getElementById('statusDisplay').style.display = 'block';
      } 
      else if (data.status === 'question_active' || data.status === 'answer_revealed') {
        hideAll();
        document.getElementById('questionWrap').style.display = 'flex';
        
        if (data.question) {
          if (data.status === 'question_active' && data.question.start_time) {
              const newStartTime = new Date(data.question.start_time);
              if (!questionStartTime || questionStartTime.getTime() !== newStartTime.getTime()) {
                  questionStartTime = newStartTime;
                  startCountdown();
              } else {
                  document.getElementById('countdownTimer').style.display = 'block';
              }
          } else {
              clearInterval(timerInterval);
          }
          document.getElementById('qText').innerText = data.question.text;
          document.getElementById('textA').innerText = data.question.option_a;
          document.getElementById('textB').innerText = data.question.option_b;
          document.getElementById('textC').innerText = data.question.option_c;
          document.getElementById('textD').innerText = data.question.option_d;

          if (data.question.image_url) {
            document.getElementById('qImage').src = data.question.image_url;
            document.getElementById('qImage').style.display = 'block';
          } else {
            document.getElementById('qImage').style.display = 'none';
          }

          // Reset styles
          ['A','B','C','D'].forEach(opt => {
            const el = document.getElementById(`opt${opt}`);
            el.className = `option-box opt-${opt}`;
          });
          
          document.getElementById('winnerBanner').style.display = 'none';

          if (data.status === 'answer_revealed' && data.question.correct_option) {
            const correctOpt = data.question.correct_option.toUpperCase();
            ['A','B','C','D'].forEach(opt => {
              const el = document.getElementById(`opt${opt}`);
              if (opt === correctOpt) {
                el.classList.add('correct');
              } else {
                el.classList.add('incorrect');
              }
            });
            
            if (data.winning_team_name) {
                document.getElementById('winnerBanner').innerText = `${data.winning_team_name} GOT IT FIRST! 🎉`;
                document.getElementById('winnerBanner').style.display = 'block';
            }
          }
        }
      }
      else if (data.status === 'leaderboard' || data.status === 'finished') {
        if (currentState !== data.status) {
          hideAll();
          document.getElementById('countdownTimer').style.display = 'none';
          clearInterval(timerInterval);
          document.getElementById('lbWrap').style.display = 'block';
          fetchLeaderboard(); // fetch and render leaderboard html
        }
      }
      
      currentState = data.status;

    } catch (e) {
      console.error(e);
    }
  }

  async function fetchLeaderboard() {
    try {
      const res = await fetch(`/api/leaderboard/${targetQuizId}/?_t=${Date.now()}`);
      const data = await res.json();
      const entries = data.leaderboard || [];
      const maxScore = entries.length > 0 ? entries[0].score || 1 : 1;

      const html = entries.map((e, i) => {
        const pos = i + 1;
        const posClass = pos === 1 ? 'pos-1' : pos === 2 ? 'pos-2' : pos === 3 ? 'pos-3' : 'pos-other';
        const posLabel = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : `#${pos}`;
        const barWidth = Math.max(4, Math.round((e.score / maxScore) * 100));

        return `
          <div class="lb-row" style="animation-delay:${i * 0.07}s">
            <div class="lb-pos ${posClass}">${posLabel}</div>
            <div class="lb-name">${e.name}</div>
            <div class="score-bar-wrap">
              <div class="score-bar" style="width:${barWidth}%"></div>
            </div>
            <div class="lb-score">${e.score}</div>
          </div>`;
      }).join('');

      document.getElementById('lbWrap').innerHTML = html;
    } catch (e) {
      console.error(e);
    }
  }

  setInterval(pollState, 1500);
  pollState();
</script>
</body>
</html>
